<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Noctis Pro PACS</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .error-container { text-align: center; padding: 40px; }
        .error-code { font-size: 96px; font-weight: bold; color: #00d4ff; line-height: 1; }
        .error-title { font-size: 24px; margin: 16px 0 8px; }
        .error-desc { color: #b3b3b3; margin-bottom: 32px; }
        .btn-home { background: #00d4ff; color: #0a0a0a; padding: 12px 28px; border-radius: 6px; text-decoration: none; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; }
        .btn-home:hover { background: #00b8d4; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-desc">The page you are looking for doesn't exist or has been moved.</p>
        <a href="/" class="btn-home"><i class="fas fa-home"></i> Return Home</a>
    </div>
</body>
</html>
